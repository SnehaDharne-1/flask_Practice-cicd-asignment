name: Flask CI/CD

on:
  push:
    branches:
      - main
      - staging
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flask-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  MONGO_URI: mongodb://localhost:27017/test_student_db
  SECRET_KEY: ci-test-secret

jobs:
  test-and-build:
    name: Install, Test and Build
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip check

      - name: Run tests
        run: pytest -v --junitxml=pytest-results.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml

      - name: Build Docker image
        run: docker build -t flask-student-app:${{ github.sha }} .

      - name: Save deployment package
        run: |
          tar --exclude='.git' --exclude='.venv' -czf flask-student-app.tar.gz .

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: flask-student-app-${{ github.sha }}
          path: flask-student-app.tar.gz

  deploy-staging:
    name: Deploy to Staging
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy application to staging
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            ./ "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:${{ secrets.STAGING_PATH }}/"

      - name: Restart staging application
        run: |
          ssh "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" <<'REMOTE'
            set -e
            cd "${{ secrets.STAGING_PATH }}"
            docker compose -f docker-compose.staging.yml up -d --build --remove-orphans
            sleep 8
            curl --fail --retry 10 --retry-delay 3 http://127.0.0.1:8000/health
          REMOTE

  deploy-production:
    name: Deploy to Production
    needs: test-and-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy application to production
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.env' \
            ./ "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_PATH }}/"

      - name: Restart production application
        run: |
          ssh "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" <<'REMOTE'
            set -e
            cd "${{ secrets.PROD_PATH }}"
            docker compose -f docker-compose.production.yml up -d --build --remove-orphans
            sleep 8
            curl --fail --retry 10 --retry-delay 3 http://127.0.0.1:80/health
          REMOTE
