name: SecureGate AI Security Gate

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  securegate-security-check:
    runs-on: ubuntu-latest

    env:
      SECUREGATE_URL: ${{ secrets.SECUREGATE_URL }}
      SECUREGATE_API_KEY: ${{ secrets.SECUREGATE_API_KEY }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      PROJECT_NAME: ${{ github.event.repository.name }}
      REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
      BRANCH_NAME: ${{ github.ref_name }}
      PIPELINE_RUN_ID: ${{ github.run_id }}
      REPOSITORY_OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Detect current commit SHA
        run: |
          CURRENT_COMMIT_SHA=$(git rev-parse HEAD)
          echo "COMMIT_SHA=$CURRENT_COMMIT_SHA" >> "$GITHUB_ENV"
          echo "Current commit SHA: $CURRENT_COMMIT_SHA"

      - name: Setup Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: "24"

      - name: Validate SecureGate AI URL
        run: |
          if [ -z "$SECUREGATE_URL" ]; then
            echo "SECUREGATE_URL GitHub secret is missing."
            exit 1
          fi

          if echo "$SECUREGATE_URL" | grep -Eq '\[|\]|\(|\)| '; then
            echo "SECUREGATE_URL is malformed."
            echo "Save it as a plain URL only, for example: https://citric-pliable-baggie.ngrok-free.dev"
            echo "Do not use Markdown format like [https://...](https://...)."
            exit 1
          fi

          case "$SECUREGATE_URL" in
            http://*|https://*) ;;
            *)
              echo "SECUREGATE_URL must start with http:// or https://"
              exit 1
              ;;
          esac

      - name: Start SecureGate AI scan
        id: securegate_start
        run: |
          if echo "$REPOSITORY_URL" | grep -Eq '\[|\]|\(|\)'; then
            echo "REPOSITORY_URL is malformed. It must be a plain URL, not a Markdown link: $REPOSITORY_URL"
            exit 1
          fi

          START_PAYLOAD=$(jq -nc \
            --arg project_name "$PROJECT_NAME" \
            --arg repository_url "$REPOSITORY_URL" \
            --arg branch "$BRANCH_NAME" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg pipeline_run_id "$PIPELINE_RUN_ID" \
            '{project_name:$project_name, repository_url:$repository_url, branch:$branch, commit_sha:$commit_sha, pipeline_run_id:$pipeline_run_id}')

          echo "SecureGate start payload:"
          echo "$START_PAYLOAD" | jq .

          HTTP_STATUS=$(curl -sS -o securegate-start-response.json -w "%{http_code}" -X POST "${SECUREGATE_URL%/}/api/v1/pipeline/start" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data "$START_PAYLOAD")

          echo "SecureGate start response status: $HTTP_STATUS"
          cat securegate-start-response.json
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "SecureGate AI rejected the pipeline start request. Check the validation details above."
            exit 1
          fi

          RESPONSE=$(cat securegate-start-response.json)
          SCAN_ID=$(echo "$RESPONSE" | jq -r .scan_id)
          if [ -z "$SCAN_ID" ] || [ "$SCAN_ID" = "null" ]; then
            echo "SecureGate AI did not return a scan_id"
            exit 1
          fi
          echo "scan_id=$SCAN_ID" >> "$GITHUB_OUTPUT"

      - name: Run GitLeaks secret scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --report-format=json \
            --report-path=/repo/gitleaks-report.json \
            --no-git || true

          test -f gitleaks-report.json || echo "[]" > gitleaks-report.json

      - name: Run Semgrep SAST scan
        run: |
          docker run --rm -v "$PWD:/src" returntocorp/semgrep:latest semgrep scan --config auto --json --output /src/semgrep-report.json /src || true
          test -f semgrep-report.json || echo '{"results":[]}' > semgrep-report.json

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs-report.json
          exit-code: 0

      - name: Ensure Trivy filesystem report exists
        run: |
          test -f trivy-fs-report.json || echo '{"Results":[]}' > trivy-fs-report.json

      - name: Run SonarQube scan
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.exclusions=.github/workflows/securegate.yml,.github/workflows/securegate-ai.yml,SecureGate.Dockerfile

      - name: Fetch SonarQube quality gate and issues
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORGANIZATION != ''
        run: |
          curl -sS \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_HOST_URL/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY&organization=$SONAR_ORGANIZATION" \
            -o sonar-gate.json

          curl -sS \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            "$SONAR_HOST_URL/api/issues/search?componentKeys=$SONAR_PROJECT_KEY&organization=$SONAR_ORGANIZATION&resolved=false&ps=500" \
            -o sonar-issues.json

          jq -n \
            --slurpfile gate sonar-gate.json \
            --slurpfile issues sonar-issues.json \
            '{projectStatus: $gate[0].projectStatus, issues: ($issues[0].issues // [])}' \
            > sonarqube-report.json

      - name: Create SonarQube placeholder report
        if: env.SONAR_HOST_URL == '' || env.SONAR_TOKEN == '' || env.SONAR_PROJECT_KEY == '' || env.SONAR_ORGANIZATION == ''
        run: |
          cat > sonarqube-report.json <<EOF
          {
            "projectStatus": {
              "status": "UNKNOWN"
            },
            "issues": []
          }
          EOF

      - name: Detect and run unit tests
        run: |
          STATUS="SKIPPED"
          FRAMEWORK="none"
          REASON="No supported unit test configuration found"
          TOTAL=0
          FAILED=0

          if [ -f package.json ] && jq -e '.scripts.test and .scripts.test != ""' package.json >/dev/null 2>&1; then
            FRAMEWORK="node"
            if npm test; then STATUS="PASSED"; REASON="Node test script passed"; else STATUS="FAILED"; REASON="Node test script failed"; FAILED=1; fi
          elif [ -d tests ] || [ -f pytest.ini ] || grep -q "pytest" pyproject.toml setup.cfg 2>/dev/null; then
            FRAMEWORK="pytest"
            python -m pip install --upgrade pip >/dev/null 2>&1 || true
            if [ -f requirements.txt ]; then python -m pip install -r requirements.txt >/dev/null 2>&1 || true; fi
            if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt >/dev/null 2>&1 || true; fi
            python -m pip install pytest >/dev/null 2>&1 || true
            if python -m pytest; then STATUS="PASSED"; REASON="pytest passed"; else STATUS="FAILED"; REASON="pytest failed"; FAILED=1; fi
          fi

          jq -n --arg status "$STATUS" --arg framework "$FRAMEWORK" --arg reason "$REASON" --argjson total "$TOTAL" --argjson failed "$FAILED" \
            '{status:$status, framework:$framework, reason:$reason, total:$total, failed:$failed}' > unit-tests-report.json

      - name: Prepare Dockerfile when missing
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "Using repository Dockerfile."
            echo "path=Dockerfile" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No Dockerfile found. Creating SecureGate.Dockerfile for image scanning."
          echo "path=SecureGate.Dockerfile" >> "$GITHUB_OUTPUT"

          if [ -f package.json ]; then
            cat > SecureGate.Dockerfile <<'EOF'
          FROM node:24-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          CMD ["npm", "start"]
          EOF
          elif [ -f requirements.txt ]; then
            cat > SecureGate.Dockerfile <<'EOF'
          FROM python:3.12-alpine
          WORKDIR /app
          COPY requirements.txt ./
          RUN pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt
          COPY . .
          CMD ["python", "app.py"]
          EOF
          else
            cat > SecureGate.Dockerfile <<'EOF'
          FROM alpine:3.20
          WORKDIR /app
          COPY . .
          CMD ["sh", "-c", "ls -la /app && sleep 30"]
          EOF
          fi

      - name: Build Docker image for image vulnerability scan
        id: image_build
        run: |
          IMAGE_NAMESPACE="${DOCKERHUB_USERNAME:-$REPOSITORY_OWNER}"
          IMAGE_REPOSITORY="$PROJECT_NAME"
          IMAGE_REPO=$(echo "$IMAGE_NAMESPACE/$IMAGE_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          SHORT_COMMIT_SHA="${COMMIT_SHA:0:8}"
          IMAGE_SHA_REF="$IMAGE_REPO:$SHORT_COMMIT_SHA"
          IMAGE_LATEST_REF="$IMAGE_REPO:latest"

          echo "SecureGate AI Docker image path: $IMAGE_SHA_REF"
          echo "Docker Hub repository will be created automatically on first push when credentials allow it: $IMAGE_REPO"

          docker build -f "${{ steps.dockerfile.outputs.path }}" -t "$IMAGE_SHA_REF" .
          docker tag "$IMAGE_SHA_REF" "$IMAGE_LATEST_REF"

          echo "image_ref=$IMAGE_SHA_REF" >> "$GITHUB_OUTPUT"
          echo "latest_ref=$IMAGE_LATEST_REF" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"

      - name: Check Docker Hub image tag freshness
        id: image_freshness
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        env:
          IMAGE_REF: ${{ steps.image_build.outputs.image_ref }}
        run: |
          if docker manifest inspect "$IMAGE_REF" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Image already exists on Docker Hub for this short commit tag. Push will be skipped."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No existing Docker Hub image found for this short commit tag. Push is needed."
          fi

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc
        with:
          image-ref: ${{ steps.image_build.outputs.image_ref }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Ensure Trivy image report exists
        run: |
          test -f trivy-image-report.json || echo '{"Results":[]}' > trivy-image-report.json

      - name: Upload GitLeaks report
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/gitleaks" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @gitleaks-report.json

      - name: Upload Semgrep report
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/semgrep" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @semgrep-report.json

      - name: Upload Trivy filesystem report
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/trivy-fs" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @trivy-fs-report.json

      - name: Upload Trivy image report
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/trivy-image" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @trivy-image-report.json

      - name: Upload SonarQube report
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/sonarqube" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @sonarqube-report.json

      - name: Upload unit-test report
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/unit-tests" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @unit-tests-report.json

      - name: Check SecureGate AI deployment decision
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          RESPONSE=$(curl -fsS "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID")
          echo "$RESPONSE"

          DECISION=$(echo "$RESPONSE" | jq -r .deployment_decision)
          SCORE=$(echo "$RESPONSE" | jq -r .security_score)
          SONAR_GATE=$(echo "$RESPONSE" | jq -r .sonar_quality_gate)
          FINDING_COUNTS=$(echo "$RESPONSE" | jq -c .finding_counts)
          TOOL_STATUS=$(echo "$RESPONSE" | jq -c .tool_status)

          echo "SecureGate AI Decision: $DECISION"
          echo "Security Score: $SCORE"
          echo "SonarQube Gate: $SONAR_GATE"
          echo "Finding Counts: $FINDING_COUNTS"
          echo "Tool Status: $TOOL_STATUS"

          if [ "$DECISION" != "APPROVED" ]; then
            echo "SecureGate AI rejected this build."
            if [ "$SONAR_GATE" != "OK" ] && [ "$SONAR_GATE" != "UNKNOWN" ]; then
              echo "Rejection reason: SonarQube quality gate is $SONAR_GATE. Check SonarCloud Quality Gate conditions."
            fi
            echo "Top findings causing/relevant to rejection:"
            echo "$RESPONSE" | jq -r '.findings[:10][] | "- [\(.tool)] \(.severity) \(.title) in \(.file // "N/A")"'
            exit 1
          fi

          echo "SecureGate AI approved this build."
          echo "The code is safe to deploy the Docker image and push it to Docker Hub."
          echo "Repository, filesystem, image, secrets, and Sonar quality checks passed SecureGate AI policy."

      - name: Push approved Docker image to Docker Hub when configured
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && steps.image_freshness.outputs.changed == 'true'
        env:
          IMAGE_REF: ${{ steps.image_build.outputs.image_ref }}
          LATEST_REF: ${{ steps.image_build.outputs.latest_ref }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker push "$IMAGE_REF"
          docker push "$LATEST_REF"
          echo "Docker image pushed to Docker Hub:"
          echo "  $IMAGE_REF"
          echo "  $LATEST_REF"

      - name: Rescan pushed Docker image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && steps.image_freshness.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@df678dbccf677bc6937338d569ba0da18964a8cc
        with:
          image-ref: ${{ steps.image_build.outputs.image_ref }}
          format: json
          output: trivy-image-report.json
          exit-code: 0

      - name: Upload post-push image rescan to SecureGate AI
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && steps.image_freshness.outputs.changed == 'true'
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
        run: |
          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/scans/$SCAN_ID/trivy-image" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            --data-binary @trivy-image-report.json
          echo "Pushed Docker image was rescanned and SecureGate AI dashboard was updated."

      - name: Docker Hub image unchanged
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && steps.image_freshness.outputs.changed == 'false'
        run: |
          echo "SecureGate AI approved this build, but Docker Hub push was skipped because this commit image already exists."

      - name: Docker Hub push not configured
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: |
          echo "SecureGate AI approved this build, but Docker Hub push was skipped because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."

      - name: Complete SecureGate AI pipeline
        if: always() && steps.securegate_start.outputs.scan_id != ''
        env:
          SCAN_ID: ${{ steps.securegate_start.outputs.scan_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          STATUS="SUCCESS"

          if [ "$JOB_STATUS" != "success" ]; then
            STATUS="FAILED"
          fi

          curl -fsS -X POST "${SECUREGATE_URL%/}/api/v1/pipeline/complete" \
            -H "Authorization: Bearer $SECUREGATE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"scan_id\":\"$SCAN_ID\",
              \"status\":\"$STATUS\"
            }"
